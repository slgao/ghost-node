name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Proto generation ────────────────────────────────────────────────────────
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install protoc
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
      - name: Generate proto
        run: |
          mkdir -p internal/grpc/proto
          protoc \
            --go_out=internal/grpc/proto --go_opt=paths=source_relative \
            --go-grpc_out=internal/grpc/proto --go-grpc_opt=paths=source_relative \
            api/proto/*.proto

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: proto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Build control-plane
        run: go build -v ./cmd/control-plane
      - name: Build node-agent
        run: go build -v ./cmd/node-agent

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: proto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.57

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: proto
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vpnplatform
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vpnplatform_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_HOST: localhost
      DATABASE_USER: vpnplatform
      DATABASE_PASSWORD: test
      DATABASE_DBNAME: vpnplatform_test
      REDIS_HOST: localhost
      JWT_SECRET: ci_test_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.out

  # ── Docker build check ──────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build control-plane image
        run: docker build -f deployments/docker/Dockerfile.control-plane -t control-plane:ci .
      - name: Build node-agent image
        run: docker build -f deployments/docker/Dockerfile.node-agent -t node-agent:ci .
