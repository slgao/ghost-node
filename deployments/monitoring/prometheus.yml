global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "control-plane"
    static_configs:
      - targets: ["control-plane:8080"]
    metrics_path: /metrics

  - job_name: "node-agent"
    static_configs:
      - targets: ["node-agent:9100"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
